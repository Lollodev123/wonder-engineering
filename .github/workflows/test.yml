name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  motion-lab:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: motion-lab/requirements.txt
      - run: python -m pip install -r motion-lab/requirements.txt
      - run: python -m unittest discover -s motion-lab/tests -v
