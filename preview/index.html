<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic Monitor Pre-vis — concept preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #000;
      --surface: #fff;
      --soft: #f5f5f5;
      --subtle: #7a7a7a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--surface); color: var(--ink); font-family: Manrope, system-ui, sans-serif; }
    body { display: grid; grid-template-rows: 56px 1fr; min-height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; border-bottom: 1px solid #eee;
      font-family: Inter, system-ui, sans-serif; font-weight: 300; font-size: 16px;
    }
    header .brand { letter-spacing: -0.01em; }
    header .meta { color: var(--subtle); font-size: 13px; display: flex; gap: 16px; align-items: center; }
    header button {
      font: inherit; font-size: 13px; font-weight: 500;
      padding: 6px 12px; border-radius: 9999px; border: 1px solid var(--ink);
      background: var(--ink); color: var(--surface); cursor: pointer;
    }
    header button.secondary { background: var(--soft); color: var(--ink); border-color: transparent; }
    main { position: relative; }
    iframe#stage {
      width: 100%; height: 100%; border: 0; display: block; background: var(--surface);
    }
    .empty {
      display: flex; align-items: center; justify-content: center; height: 100%;
      color: var(--subtle); font-size: 14px; padding: 24px; text-align: center;
    }
    .empty code { background: var(--soft); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Kinetic Monitor Pre-vis</div>
    <div class="meta">
      <span id="slug-label">no concept loaded</span>
      <button class="secondary" id="capture-btn" disabled>Capture loop.webm ↗</button>
      <button id="replay-btn" disabled>Replay ↻</button>
    </div>
  </header>
  <main>
    <iframe id="stage" title="concept stage"></iframe>
  </main>
  <script src="./capture.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    // Also accept hash-based ?concept= (some servers strip query strings on .html redirects).
    const hashParams = new URLSearchParams((location.hash || '').replace(/^#/, ''));
    // Default to the active concept this repo is scoped to.
    const slug = params.get('concept') || hashParams.get('concept') || '_example-sports-tech';
    const stage = document.getElementById('stage');
    const slugLabel = document.getElementById('slug-label');
    const captureBtn = document.getElementById('capture-btn');
    const replayBtn = document.getElementById('replay-btn');

    if (false) {
      // (left as a placeholder; we now always default to a slug)
    } else {
      stage.src = `../concepts/${slug}/artifact.html`;
      slugLabel.textContent = slug;
      stage.addEventListener('load', () => {
        captureBtn.disabled = false;
        replayBtn.disabled = false;
      });
      replayBtn.addEventListener('click', () => {
        try {
          const w = stage.contentWindow;
          if (w && typeof w.replayLoop === 'function') w.replayLoop();
          else stage.src = stage.src;  // fallback: hard reload
        } catch (e) { stage.src = stage.src; }
      });
      captureBtn.addEventListener('click', async () => {
        captureBtn.disabled = true;
        captureBtn.textContent = 'Recording 6.0 s…';
        try {
          const blob = await window.captureFromIframe(stage, 6.0);
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `${slug}__loop.webm`;
          a.click();
          captureBtn.textContent = 'Downloaded ↓';
        } catch (err) {
          console.error(err);
          captureBtn.textContent = 'Capture failed — see console';
        } finally {
          setTimeout(() => { captureBtn.disabled = false; captureBtn.textContent = 'Capture loop.webm ↗'; }, 2500);
        }
      });
    }
  </script>
</body>
</html>
